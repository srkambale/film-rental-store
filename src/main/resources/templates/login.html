<!DOCTYPE html>
<html>
<head>
    <title>Film Rental Login</title>
    <style>
        body {
            font-family: Arial;
            background: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 10px;
            width: 300px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
        }

        input {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
        }

        button {
            width: 100%;
            padding: 10px;
            background: black;
            color: white;
            border: none;
            cursor: pointer;
        }

        .error {
            color: red;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Login</h2>

    <form method="post" action="/login">
        <input type="text" name="username" placeholder="Username / Email" required />
        <input type="password" name="password" placeholder="Password" required />

        <button type="submit">Login</button>
    </form>

    <!-- Error message -->
    <div class="error">
        <p th:if="${param.error}">Invalid username or password</p>
        <p th:if="${param.logout}">Logged out successfully</p>
    </div>
</div>

</body>
</html>
