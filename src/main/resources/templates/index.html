<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Our Team - API Documentation</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
    <div class="container">
        <header>
            <h1>Film Rental Store</h1>
            <p>Our dedicated project team and their respective module endpoints.</p>
        </header>

        <div class="team-grid">
            <a th:each="member : ${team}" th:href="@{'/endpoints/' + ${member.moduleId}}" class="team-card">
                <img th:src="@{${member.photoUrl}}" th:alt="${member.name}" width="180" height="180">
                <strong th:text="${member.name}">Name</strong>
                <span th:text="${member.role}" style="color: var(--text-muted); font-size: 0.9rem;">Role</span>
                <span class="team-link-text">View Endpoints &rarr;</span>
            </a>
        </div>

        <footer style="margin-top: 60px; text-align: center; border-top: 1px solid var(--border); padding-top: 20px;">
            <p>&copy; 2026 Film Rental Store Team</p>
        </footer>
    </div>
</body>
</html>
