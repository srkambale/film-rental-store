<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${member.name} + ' - API Documentation'">Member Endpoints</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <style>
        .clickable-path { cursor: pointer; transition: background 0.2s; }
        .clickable-path:hover { background-color: #f1f5f9; color: #4f46e5; }
        .method-badge { cursor: pointer; }
        .field-label { text-transform: capitalize; font-weight: 700; color: #475569; }
        .dynamic-form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <a th:href="@{/}" class="back-link">&larr; Back to Team Grid</a>

        <div class="profile-header">
            <img th:src="@{${member.photoUrl}}" th:alt="${member.name}" width="120" height="120">
            <div>
                <h1 th:text="${member.name}" style="text-align: left; margin:0;">Name</h1>
                <p><strong th:text="${member.role}">Role</strong></p>
                <p th:text="${member.description}">Module Description</p>
            </div>
        </div>

        <div class="token-container">
            <label style="font-weight: 700; display: block; margin-bottom: 8px;">Global Authentication (JWT):</label>
            <div style="display: flex; gap: 10px;">
                <input type="password" id="global-token-viewer" class="form-control" placeholder="Paste your Bearer token here..." oninput="syncToken()">
                <button onclick="toggleTokenVisibility()" class="try-btn" style="background:#64748b;">Show/Hide</button>
            </div>
            <small style="color: var(--text-muted);">Saved in browser for all modules.</small>
        </div>

        <h2>Module Endpoints</h2>
        <table class="endpoint-table">
            <thead>
                <tr>
                    <th>Method</th>
                    <th>Path (Click to try)</th>
                    <th>Description</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="endpoint : ${member.endpoints}">
                    <td>
                        <span th:class="'method-badge method-' + ${endpoint.method}"
                              th:data-method="${endpoint.method}" 
                              th:data-path="${endpoint.path}"
                              th:data-sample="${endpoint.sampleBody}"
                              onclick="window.openConsole(this)"
                              th:text="${endpoint.method}">GET</span>
                    </td>
                    <td class="clickable-path" 
                        th:data-method="${endpoint.method}" 
                        th:data-path="${endpoint.path}"
                        th:data-sample="${endpoint.sampleBody}"
                        onclick="window.openConsole(this)">
                        <code th:text="${endpoint.path}">/api/v1/...</code>
                    </td>
                    <td th:text="${endpoint.description}">Description</td>
                </tr>
            </tbody>
        </table>

        <!-- API Console Modal -->
        <div id="modal-overlay" class="modal-overlay" onclick="window.closeConsole()">
            <div class="modal" onclick="event.stopPropagation()">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                    <h3 id="modal-title" style="margin:0; color: #1e293b;">API Test Console</h3>
                    <button onclick="window.closeConsole()" style="border:none; background:none; font-size: 2rem; cursor:pointer;">&times;</button>
                </div>
                <hr style="margin-bottom: 25px; border:0; border-top: 1px solid #e2e8f0;">

                <form id="proxy-form" th:action="@{/api-test/execute}" method="post">
                    <!-- Hidden fields for the proxy -->
                    <input type="hidden" name="method" id="form-method">
                    <input type="hidden" name="url" id="form-url">
                    <input type="hidden" name="body" id="form-body">
                    <input type="hidden" name="token" id="form-token">

                    <div id="path-vars-section"></div>

                    <div id="dynamic-fields-section" style="display: none;">
                        <h4 style="margin-bottom: 15px; color: var(--primary);">Data Entry Form</h4>
                        <div id="fields-container" class="dynamic-form-grid">
                            <!-- Dynamic inputs injected here -->
                        </div>
                    </div>

                    <button type="submit" class="btn-run" onclick="prepareSubmission(event)">Execute & View Results</button>
                </form>
            </div>
        </div>

        <footer style="margin-top: 60px; text-align: center; border-top: 1px solid var(--border); padding: 40px 0;">
            <p>&copy; 2026 Film Rental Store Team</p>
        </footer>
    </div>

    <script th:inline="javascript">
        window.currentEndpoint = null;

        document.addEventListener('DOMContentLoaded', () => {
             const savedToken = localStorage.getItem('api_token') || '';
             document.getElementById('global-token-viewer').value = savedToken;
             document.getElementById('form-token').value = savedToken;
        });

        function syncToken() {
            const token = document.getElementById('global-token-viewer').value;
            localStorage.setItem('api_token', token);
            document.getElementById('form-token').value = token;
        }

        function toggleTokenVisibility() {
            const el = document.getElementById('global-token-viewer');
            el.type = el.type === 'password' ? 'text' : 'password';
        }

        window.openConsole = function(element) {
            window.currentEndpoint = {
                method: element.getAttribute('data-method'),
                basePath: element.getAttribute('data-path'),
                sampleBody: element.getAttribute('data-sample')
            };

            document.getElementById('modal-title').innerText = `${window.currentEndpoint.method} Test Form`;
            document.getElementById('form-method').value = window.currentEndpoint.method;

            // 1. Handle Path Variables
            const varsSection = document.getElementById('path-vars-section');
            varsSection.innerHTML = '';
            const matches = (window.currentEndpoint.basePath || '').match(/\{[^}]+\}/g);
            if (matches) {
                varsSection.innerHTML = '<h4 style="margin-bottom:10px; color:var(--primary);">Path Parameters</h4>';
                matches.forEach(match => {
                    const varName = match.replace(/[\{\}]/g, '');
                    varsSection.innerHTML += `
                        <div class="form-group">
                            <label class="field-label">${varName}:</label>
                            <input type="text" class="form-control path-var-input" data-key="${match}" placeholder="Required Value" required>
                        </div>
                    `;
                });
            }

            // 2. Handle Dynamic Body Fields
            const fieldsSection = document.getElementById('dynamic-fields-section');
            const container = document.getElementById('fields-container');
            container.innerHTML = '';
            
            if (['POST', 'PUT', 'PATCH'].includes(window.currentEndpoint.method) && window.currentEndpoint.sampleBody) {
                fieldsSection.style.display = 'block';
                try {
                    const sample = JSON.parse(window.currentEndpoint.sampleBody);
                    Object.keys(sample).forEach(key => {
                        container.innerHTML += `
                            <div class="form-group">
                                <label class="field-label">${key}:</label>
                                <input type="text" class="form-control body-field-input" data-key="${key}" value="${sample[key]}">
                            </div>
                        `;
                    });
                } catch(e) {
                    // Fallback to raw text if JSON is malformed
                    fieldsSection.style.display = 'none';
                }
            } else {
                fieldsSection.style.display = 'none';
            }

            document.getElementById('modal-overlay').style.display = 'block';
        };

        window.closeConsole = function() {
            document.getElementById('modal-overlay').style.display = 'none';
        };

        function prepareSubmission(event) {
            let finalUrl = window.currentEndpoint.basePath;
            
            // Resolve Path Variables
            document.querySelectorAll('.path-var-input').forEach(input => {
                if (!input.value) {
                    alert('Please fill all path variables');
                    event.preventDefault();
                    return;
                }
                finalUrl = finalUrl.replace(input.getAttribute('data-key'), input.value);
            });
            document.getElementById('form-url').value = finalUrl;

            // Re-assemble Body JSON
            if (['POST', 'PUT', 'PATCH'].includes(window.currentEndpoint.method)) {
                const bodyObj = {};
                document.querySelectorAll('.body-field-input').forEach(input => {
                    bodyObj[input.getAttribute('data-key')] = input.value;
                });
                document.getElementById('form-body').value = JSON.stringify(bodyObj);
            }
        }
    </script>
</body>
</html>
